file<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Alunos - Bootstrap</title>

    <!-- CDN Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Cadastro de Alunos</h1>

    <!-- Formulário -->
    <div class="card shadow p-4">
        <h5 class="mb-3">Dados do Aluno</h5>

        <form>
            <div class="mb-3">
                <label class="form-label">Nome:</label>
                <input type="text" class="form-control" name="nome" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" class="form-control" name="email" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Idade:</label>
                <input type="number" class="form-control" name="idade">
            </div>

            <div class="mb-3">
                <label class="form-label">Curso:</label>
                <select class="form-select" name="curso">
                    <option>Engenharia de Software</option>
                    <option>Sistemas de Informação</option>
                    <option>Ciência da Computação</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Turno:</label><br>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="turno" value="manha">
                    <label class="form-check-label">Manhã</label>
                </div>

                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="turno" value="noite">
                    <label class="form-check-label">Noite</label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Cadastrar
            </button>
        </form>
    </div>

    <!-- Tabela -->
    <h2 class="mt-5">Lista de Alunos</h2>

    <div class="table-responsive">
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Idade</th>
                    <th>Curso</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Ana Silva</td>
                    <td>ana@email.com</td>
                    <td>22</td>
                    <td>Engenharia de Software</td>
                </tr>

                <tr>
                    <td>Carlos Souza</td>
                    <td>carlos@email.com</td>
                    <td>25</td>
                    <td>Sistemas de Informação</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
